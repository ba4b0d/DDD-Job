# 3DJAT Pricing — test configuration for pytest
# This file only configures the test runner; the FastAPI app is
# imported from backend/app and test fixtures live in backend/tests/conftest.py.

[pytest]
# Discover tests inside the backend/tests directory.
testpaths = tests

# Make the backend/ project root importable so `from app...` works in tests.
# (Same effect as backend/tests/conftest.py inserting backend_dir onto sys.path,
# but provided here so pytest can also run from the repo root if desired.)
pythonpath = .

# Default options: verbose output, short tracebacks, show summary on failure.
addopts = -ra -v

# Filter out harmless deprecation noise from third-party libs.
# StarletteDeprecationWarning and PydanticDeprecatedSince20 are not
# auto-importable as Warning subclasses, so we suppress by message instead.
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore:Using `httpx` with `starlette.testclient` is deprecated
    ignore:Support for class-based `config` is deprecated

# Stable test discovery: ignore the .pytest_cache and other artefacts.
norecursedirs = .pytest_cache .venv uploads __pycache__
